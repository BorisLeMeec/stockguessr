<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOCKGUESSR — ten charts, no names</title>
<meta name="description" content="Guess the stock and the timeframe from the chart alone. Ten rounds, real market data, no login.">
<meta property="og:title" content="STOCKGUESSR">
<meta property="og:description" content="Ten charts. No names. Trust the line. Guess the stock and the timeframe from the chart alone.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="STOCKGUESSR">
<meta property="og:url" content="https://stockguessr.fr">
<meta property="og:image" content="https://stockguessr.fr/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">
<meta property="og:image:alt" content="STOCKGUESSR — guess the stock from the chart">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#050605">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://stockguessr.fr/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<!-- ════════ MENU ════════ -->
<section id="screen-menu" class="screen active">
  <div class="menu-inner">
    <p class="ticker-tape" id="ticker-tape" aria-hidden="true"></p>
    <h1 class="logo">STOCK<span class="logo-accent">GUESSR</span></h1>
    <p class="tagline">ten charts. <em>no names.</em> trust the line.</p>

    <div class="settings-row">
      <button class="settings-gear" id="btn-settings" aria-label="Settings">⚙</button>
      <div class="settings-panel" id="settings-panel" hidden>
        <p class="settings-title">// SETTINGS</p>
        <div class="settings-field">
          <span class="field-label">ROUNDS</span>
          <div class="tf-pills" id="rounds-pills-mobile">
            <button class="tf-pill" data-n="1">1</button>
            <button class="tf-pill" data-n="5">5</button>
            <button class="tf-pill sel" data-n="10">10</button>
            <button class="tf-pill" data-n="20">20</button>
          </div>
        </div>
      </div>
    </div>

    <div class="diff-grid">
      <button class="diff-card" data-diff="easy">
        <span class="diff-num">01</span>
        <span class="diff-name">Easy</span>
        <span class="diff-desc">Mega-caps, prices on the axis. Browse all timeframes freely.</span>
        <span class="diff-meter"><i style="--w:25%"></i></span>
      </button>
      <button class="diff-card" data-diff="medium">
        <span class="diff-num">02</span>
        <span class="diff-name">Medium</span>
        <span class="diff-desc">Top 50, the axis goes dark. Timeframes still yours to browse.</span>
        <span class="diff-meter"><i style="--w:50%"></i></span>
      </button>
      <button class="diff-card" data-diff="hard">
        <span class="diff-num">03</span>
        <span class="diff-name">Hard</span>
        <span class="diff-desc">All 500 tickers, one frozen chart — and now you guess the timeframe too.</span>
        <span class="diff-meter"><i style="--w:75%"></i></span>
      </button>
      <button class="diff-card" data-diff="veryhard">
        <span class="diff-num">04</span>
        <span class="diff-name">Very Hard</span>
        <span class="diff-desc">Pure chaos. Even the quants would sweat.</span>
        <span class="diff-meter"><i style="--w:100%"></i></span>
      </button>
    </div>
    <div class="rounds-row">
      <span class="field-label">// ROUNDS</span>
      <div class="tf-pills" id="rounds-pills">
        <button class="tf-pill" data-n="1">1</button>
        <button class="tf-pill" data-n="5">5</button>
        <button class="tf-pill sel" data-n="10">10</button>
        <button class="tf-pill" data-n="20">20</button>
      </div>
    </div>
    <p class="menu-foot">real market data · no login · just vibes</p>
  </div>
</section>

<!-- ════════ GAME ════════ -->
<section id="screen-game" class="screen">
  <header class="game-header">
    <div class="gh-left">
      <span class="gh-brand">STOCKGUESSR</span>
      <span class="gh-round" id="hud-round">ROUND 01/10</span>
    </div>
    <div class="gh-right">
      <span class="gh-level" id="hud-level">EASY</span>
      <span class="gh-score" id="hud-score">0 PTS</span>
    </div>
  </header>

  <div class="chart-stage">
    <div class="chart-frame">
      <canvas id="chart"></canvas>
      <aside class="intel-card" id="intel-card" hidden>
        <span class="intel-label">// CLUES</span>
        <p class="intel-row">SINCE <b id="intel-founded"></b></p>
        <p class="intel-row intel-sector" id="intel-sector"></p>
      </aside>
      <div class="chart-corners" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
    </div>
  </div>

  <div class="guess-panel" id="guess-panel">
    <div class="guess-row">
      <div class="field field-company">
        <label class="field-label" for="company-input">// COMPANY</label>
        <input id="company-input" type="text" autocomplete="off" spellcheck="false"
               placeholder="start typing…">
        <ul class="ac-list" id="ac-list" hidden></ul>
      </div>
    </div>
    <div class="guess-row">
      <div class="field">
        <span class="field-label" id="tf-label">// TIMEFRAME</span>
        <div class="tf-pills" id="tf-pills"></div>
      </div>
    </div>
    <button class="btn-submit" id="btn-submit" disabled>LOCK IN GUESS</button>
  </div>

  <div class="reveal-panel" id="reveal-panel" hidden>
    <p class="reveal-verdict" id="reveal-verdict"></p>
    <div class="reveal-solution">
      <div class="rs-block">
        <span class="rs-label">COMPANY</span>
        <span class="rs-value" id="reveal-company"></span>
        <span class="rs-mark" id="reveal-company-mark"></span>
      </div>
      <div class="rs-block">
        <span class="rs-label">TIMEFRAME</span>
        <span class="rs-value" id="reveal-tf"></span>
        <span class="rs-mark" id="reveal-tf-mark"></span>
      </div>
      <div class="rs-block">
        <span class="rs-label">POINTS</span>
        <span class="rs-value rs-points" id="reveal-points"></span>
      </div>
    </div>
    <button class="btn-submit btn-next" id="btn-next">NEXT CHART →</button>
  </div>
</section>

<!-- ════════ RESULTS ════════ -->
<section id="screen-results" class="screen">
  <div class="results-inner">
    <p class="results-over">SESSION CLOSED</p>
    <p class="results-grade" id="results-grade"></p>
    <p class="results-score"><span id="results-score">0</span><span class="rs-max" id="results-max"></span></p>
    <ul class="results-list" id="results-list"></ul>
    <div class="share-box">
      <img id="share-img" src="data:," alt="Your STOCKGUESSR score card">
      <div class="share-actions">
        <button class="btn-submit btn-share" id="btn-share" hidden>SHARE ↗</button>
        <button class="btn-submit btn-share" id="btn-copy-img">COPY IMAGE</button>
        <a class="btn-submit btn-share" id="btn-x" target="_blank" rel="noopener">POST ON 𝕏</a>
        <button class="btn-submit btn-again" id="btn-again">RUN IT BACK</button>
      </div>
      <p class="share-feedback" id="share-feedback">&nbsp;</p>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
